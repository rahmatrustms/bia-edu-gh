<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ======== Favicon ====== -->
    <link rel="icon" href="https://res.cloudinary.com/rahmatrust-m-s/image/upload/w_1000/f_auto/q_auto/bia-logo_hcdlmj.png" 
          type="image/png" 
          width="2000"
          hight="1000">
    <title>B.I.A | Media Library</title>

    <!-- Customized CSS -->
    <link rel="stylesheet" type="text/css" href="../css/mediaLibrary.css">

    <!-- Custom helpers -->
    <link rel="stylesheet" type="text/css" href="../css/helpers.css">

    <!-- Custom audio player CSS -->
    <link rel="stylesheet" type="text/css" href="../css/audioPlayer.css">

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    
    <!-- Import Bootstrap Icon Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
/* ======== Styles for the body ====== */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    background-repeat: no-repeat; 
    background-size: cover;
}
/* ============================================ */

/* ======== Styles for the navigation bar ====== */
nav {
    background:white;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0;
    padding: 0 16px;
    height: 56px;
    line-height: 40px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.brandLogo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
}

.brandLogo a {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #04500e;
    text-decoration: none;
    font-weight: 700;
    white-space: nowrap;
}

.brandLogo img {
    width: 45px;
    height: 34px;
    object-fit: contain;
}

.spacer {
    flex: 1;
}

.nav-links {
    display: flex;
    align-items: center;
}

.nav-links ul {
    display: flex;
    gap: 8px;
    margin: 0;
    padding: 0;
    list-style: none;
}



.nav-links a:hover {
    background: whitesmoke;
}

.media-player-icon {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #04500e;
    font-weight: 600;
    white-space: nowrap;
}

.sidenav-trigger {
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    border-radius: 10px;
    cursor: pointer;
}

.sidenav-trigger:hover {
    background: whitesmoke;
}

.sidenav {
    width: 42%;
    max-width: 300px;
    border-radius: 0 18px 18px 0;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
    padding: 12px 0 20px;
    background: white;
    color: #04500e;
}

.sidenav h5 {
     color: #04500e;
}

.sidenav-header {
    padding: 8px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.16);
    margin-bottom: 8px;
}

.sidenav-header h5 {
    margin: 6px 0 6px;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
}

.sidenav li {
    margin: 4px 10px;
    border-radius: 12px;
    overflow: hidden;
}

.sidenav li a {
    color: #f7fff8 !important;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 12px;
    transition: all 0.25s ease;
}

.sidenav li a:hover,
.sidenav li.active a {
    background: rgba(255,255,255,0.16) !important;
    color: #ffffff !important;
    transform: translateX(4px);
}

.sidenav li.active {
    background: rgba(255,255,255,0.14) !important;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.16);
}

@media (max-width: 768px) {
    nav {
        padding: 0 12px;
    }

    .nav-links, .spacer,
    .media-player-icon #first, .media-player-icon #second  {
        display: none;
    }

    .sidenav-trigger {
        display: flex;
    }
}

@media (max-width: 480px) {
    .brandLogo {
        font-size: 0.9rem;
    }
}
/* ============================================ */
.subnav {
    margin-bottom: 0;
}
.back-nav {
    display: none;
    align-items: center;
    justify-content: center;
    margin: 0 0 0 25px;
    background: #f6f7ec;
    color: #04500e !important;
    border-radius: 4px !important;
}

.back-nav.visible {
    display: flex;
}

.playlist-panel {
    margin: 16px 8px 0 0;
    max-width: 900px;
}

#audio-list {
    list-style: none;
    margin: 0;
    padding: 0;
}

.media-player {
    display: flex;
}
    </style>
</head>
<body>
    <header>
        <nav>
            <!----------- Brand Logo ----------->
            <div class="brandLogo">
                <a href="media-library.html" target="content">
                    <img src="https://res.cloudinary.com/rahmatrust-m-s/image/upload/w_1000/f_auto/q_auto/bia-logo_hcdlmj.png" 
                         alt="Logo"
                         width="1000"
                         height="900">
                    <b id="first">Breman Islamic</b><b id="second">Academy</b>
                </a>
            </div>

            <div class="spacer" style="flex-grow: 1;"></div>
  
            <!----------- Desktop nav --------->
            <div class="nav-links">
                <ul>
                    <li><a href="../index.html" target="content"
                           class="green-text">Home</a>
                    </li>

                    <li><a href="media-library.html" target="content" 
                           id="active" 
                           class="green-text">Media Library</a>
                    </li>
                </ul>
            </div>

            <!------------ Media Player Icon ---------->
            <div class="media-player-icon">
                    <i class="bi bi-headset"></i>
                    <b id="first">Hide Media</b><b id="second">Player</b>
            </div>

            <!------------- Mobile Nav Icon ---------->
            <a href="#" 
               data-target="mobile-nav" 
               class="sidenav-trigger right green-text" 
               aria-label="Open navigation menu"
               style="height: 45px;
               justify-content: center;">
                <i class="bi bi-list"></i>
            </a>
        </nav>

        <section class="subnav">
            <hr style="margin: 2px 0 0 0; 
                border: none; 
                border-top: 1px solid #22c90b; 
                width: 100%; 
                margin-left: auto; 
                margin-right: auto;">

            <a href="#"
               target="content"
               id="backToMediaLibrary"
               class="btn-small left back-nav"
               aria-label="Back to media library">
              <i class="bi bi-arrow-left" style="font-size: 24px;"></i>
            </a>

            <h1 class="flow-text center font-bold" 
                style="margin: 10px 180px 0 0; 
                white-space: nowrap;">
                <i class="bi bi-headset"></i>Media Library
            </h1>

            <hr style=" border: none; 
                border-top: 1px solid #22c90b;
                width: 100%; 
                margin-bottom: 0;
                margin-left: auto; 
                margin-right: auto;">
        </section>
    </header>

    <main>
        <aside>
            <ul class="sidenav" 
                id="mobile-nav" 
                style="margin-top: 45px; 
                color: black;">

                <div class="sidenav-header white-text center-align">
                    <h5>Quick Access</h5>
                </div>

                <div class="nav-item">
                <li>
                    <a href="../index.html" class="nav-link">
                        <span style="color: #04500e;">Home</span>
                    </a>
                </li>

                <li>
                    <a href="media-library.html" 
                    target="content" 
                    class="nav-link"
                    id="active">
                        <span style="color: #04500e;">Media Library</span>
                    </a>
                </li>
            </ul>
        </aside>

        <iframe
            name="content"
            src="media-library.html">
        </iframe>

        <section id="mediaPlayer"
                 class="media-player container">
            <div class="track-info">

                <img id="trackArtwork"
                    src="https://res.cloudinary.com/rahmatrust-m-s/image/upload/favicon_hajuj4.png"
                    alt="Artwork"
                    width="80"
                    height="60">

                <div class="track-details">

                    <div id="trackTitle">
                        No Track Playing
                    </div>

                    <div id="trackArtist" style="display: none;">
                        Breman Islamic Academy
                    </div>

                </div>

            </div>
            
            <!-- Timeline -->
            <div class="timeline">
                <span id="currentTime">0:00</span>
                <input type="range" id="progress" value="0" min="0" max="100">
                <span id="duration">0:00</span>
            </div>

            <!-- Extras -->
            <div class="extras">
                <!-- Controls -->
                <div class="controls">
                    <button id="backward" style="font-size: 18px;"><i class="bi bi-skip-start-fill"></i></button>
                    <button id="playPause" style="font-size: 18px;"><i class="bi bi-play-fill"></i></button>
                    <button id="forward" style="font-size: 18px;"><i class="bi bi-skip-end-fill"></i></button>
                    <!-- 10s backward -->
                    <button id="backward-10">
                        <span class="material-symbols-outlined" style="font-size: 20px">replay_10</span>
                    </button>
                    <!-- 10s forward -->
                    <button id="forward-10">
                        <!-- Material icon forward_10 -->
                        <span class="material-symbols-outlined" style="font-size: 20px;">forward_10</span>
                    </button>
                </div>

                <div class="playback-speed">
                    <select id="speed" class="browser-default">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                </div>

                <div class="volume-controls">
                    <button id="mute"><i class="bi bi-volume-up-fill"></i></button>
                    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
                    <span class="volume-rate">100%</span>
                </div>
            </div>
        </section>
        
    </main>

    <footer>
        <section class="copy-right">
            <p>&copy; 2026 Breman Islamic Academy. All rights reserved.</p>
        </section>
    </footer>

    <!-- Materialize JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script src="../js/storage.js"></script>

    <script src="../js/player.js"></script>

    <script src="../js/player-ui.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    $(document).ready(function() {
        $('.nav-links a').on('click', function() {
            $('.nav-links a').removeAttr('id');
            $(this).attr('id', 'active');
        });

        if (window.M && typeof M.Sidenav !== 'undefined') {
            const sidenavElems = document.querySelectorAll('.sidenav');
            M.Sidenav.init(sidenavElems, { edge: 'left' });
        }
    });

    const iframe = document.querySelector('iframe[name="content"]');
    const backButton = document.getElementById('backToMediaLibrary');
    const defaultFramePage = 'media-library.html';

    function getIframePageName() {
        if (!iframe || !iframe.contentWindow || !iframe.contentWindow.location) {
            return '';
        }
        const href = iframe.contentWindow.location.href;
        return href.split('/').pop() || '';
    }

    function updateBackButton() {
        if (!backButton) return;
        const pageName = getIframePageName();
        const isLibraryView = pageName === defaultFramePage || pageName === '';
        backButton.classList.toggle('visible', !isLibraryView);
    }

    if (backButton) {
        backButton.addEventListener('click', function (event) {
            event.preventDefault();
            if (iframe) {
                iframe.src = defaultFramePage;
            }
            updateBackButton();
        });
    }

    if (iframe) {
        iframe.addEventListener('load', updateBackButton);
    }

    window.addEventListener('load', updateBackButton);
    </script>
    <audio
        id="globalAudio"
        preload="metadata">
    </audio>
</body>
</html>
