<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ======== Favicon ====== -->
    <link rel="icon" href="https://res.cloudinary.com/rahmatrust-m-s/image/upload/w_1000/f_auto/q_auto/bia-logo_hcdlmj.png" 
          type="image/png" 
          width="2000"
          hight="1000">
    <title>B.I.A | Media Library</title>

    <!-- Customized CSS -->
    <link rel="stylesheet" type="text/css" href="../css/mediaLibrary.css">

    <!-- Custom helpers -->
    <link rel="stylesheet" type="text/css" href="../css/helpers.css">

    <!-- Custom audio player CSS -->
    <link rel="stylesheet" type="text/css" href="../css/audioPlayer.css">

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    
    <!-- Import Bootstrap Icon Font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
    /* ======== Global page layout ====== */
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        background-repeat: no-repeat; 
        background-size: cover;
    }
    /* ============================================ */

    /* ======== Header and top navigation ====== */
    nav {
        background:white;
        display: flex;
        align-items: center;
        gap: 0px;
        margin: 0;
        padding: 0 16px;
        min-height: 56px;
        line-height: 40px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        flex-wrap: nowrap;
    }

    .brandLogo {
        display: flex;
        align-items: center;
        flex-shrink: 1;
        min-width: 0;
    }

    .brandLogo a {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #04500e;
        text-decoration: none;
        font-weight: 700;
        white-space: nowrap;
        min-width: 0;
    }

    .brandLogo img {
        width: 45px;
        height: 34px;
        object-fit: contain;
    }

    .spacer {
        flex: 1 1 auto;
        min-width: 12px;
    }

    .nav-links {
        display: flex;
        align-items: center;
    }

    .nav-links ul {
        display: flex;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
    }



    .nav-links a:hover {
        background: whitesmoke;
    }

    .media-player-icon {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #04500e;
        font-weight: 600;
        white-space: nowrap;
        flex-shrink: 0;
        margin-left: 8px;
        background: transparent;
        border: none;
        padding: 0;
        cursor: pointer;
    }

    .media-player-icon:hover {
        color: #056313;
    }

    .sidenav-trigger {
        display: none;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
        margin-left: 8px;
        border-radius: 8px;
        cursor: pointer;
        flex-shrink: 0;
    }

    @media (max-width: 1024px) {
        .sidenav-trigger {
            display: flex;
        }
    }

    .sidenav-trigger:hover {
        background: whitesmoke;
    }

    /* ======== Mobile sidenav styles ====== */
    .sidenav {
        display: none;
        width: min(150px, 84vw);
        max-width: 280px;
        height: 250px;
        max-height: calc(100vh - 66px);
        margin: 0;
        border-radius: 12px 12px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
        padding: 0;
        background: white;
        color: #04500e;
        position: absolute;
        top: 58px;
        left: 100%;
        z-index: 1000;
        overflow: hidden;
    }

    .sidenav.is-open {
        display: block;
    }

    .sidenav h6 {
        color: #04500e; 
        margin: 10px 0 0 5px;
        padding-bottom: 3px;
        font-weight: bold;
        white-space: nowrap;
    }

    .audio-sidenav-close {
        position: absolute;
        bottom: 10px;
        right: 2px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        color: #04500e !important;
        text-decoration: none;
        z-index: 1000;
        font-size: 0.95rem;
    }

    .audio-sidenav-close:hover {
        background: rgba(4, 80, 14, 0.08);
        color: #04500e !important;
    }

    .sidenav-header {
        padding: 0px 0px 0px 0px;
        border-bottom: 1px solid rgba(255,255,255,0.16);
        margin-bottom: 8px;
        position: relative;
    }

    .sidenav li a {
        color: #04500e !important;
        display: flex;
        align-items: center;
        border-radius: 12px;
        transition: all 0.25s ease;
    }

    .sidenav-overlay {
        display: none !important;
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
    }

    /* ======== Responsive behavior ====== */
    @media (max-width: 768px) {
        nav {
            padding: 0 12px;
        }

        .nav-links, .spacer,
        .media-player-icon #first, .media-player-icon #second  {
            display: none;
        }

        .media-player-icon {
            margin-left: 0;
        }
    }

    @media (max-width: 480px) {
        .brandLogo a {
            gap: 4px;
            font-size: 0.95rem;
        }

        .brandLogo img {
            width: 36px;
            height: 28px;
        }

        .sidenav-trigger {
            padding: 0 6px;
        }
    }

    @media (max-width: 480px) {
        .brandLogo {
            font-size: 0.9rem;
        }
    }
    /* ============================================ */

    /* ======== Subnav and content area ====== */
    .subnav {
        margin-bottom: 0;
    }
    .back-nav {
        display: none;
        align-items: center;
        justify-content: center;
        margin: 0 0 0 25px;
        background: #f6f7ec;
        color: #04500e !important;
        border-radius: 4px !important;
    }

    .back-nav.visible {
        display: flex;
    }

    .playlist-panel {
        margin: 16px 8px 0 0;
        max-width: 900px;
    }

    #audio-list {
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .media-player {
        display: flex;
    }

    .subnav {
        margin: 0;
        padding: 0;
    }

    iframe[name="content"] {
        display: block;
        margin-top: 0;
        border: 0;
    }
    </style>
</head>
<body>
    <header>
        <nav>
            <!----------- Brand Logo ----------->
            <div class="brandLogo">
                <a href="media-library.html" target="content">
                    <img src="https://res.cloudinary.com/rahmatrust-m-s/image/upload/w_1000/f_auto/q_auto/bia-logo_hcdlmj.png" 
                         alt="Logo"
                         width="1000"
                         height="900">
                    <b id="first">Breman Islamic</b><b id="second">Academy</b>
                </a>
            </div>

            <div class="spacer" style="flex-grow: 1;"></div>
  
            <!----------- Desktop nav --------->
            <div class="nav-links">
                <ul>
                    <li><a href="../index.html"
                           class="green-text">Home</a>
                    </li>

                    <li><a href="media-library.html" target="content" 
                           id="active" 
                           class="green-text">Media Library</a>
                    </li>
                </ul>
            </div>

            <!------------ Media Player Icon ---------->
            <button type="button" class="media-player-icon" id="toggleMediaPlayer" aria-label="Toggle media player" style="background: transparent; border: none; padding: 0; cursor: pointer;">
                <i class="bi bi-headset"></i>
            </button>

            <!------------- Mobile Nav Icon ---------->
            <a href="#" 
               data-target="mobile-nav" 
               class="sidenav-trigger right green-text" 
               aria-label="Open navigation menu"
               style="height: 45px;
               justify-content: center;">
                <i class="bi bi-list"></i>
            </a>
        </nav>

        <section class="subnav" style="margin-top: 0; padding-top: 0;">
            <hr style="margin: 0 0 0 0; 
                border: none; 
                border-top: 1px solid #22c90b; 
                width: 100%; 
                margin-left: auto; 
                margin-right: auto;">

            <a href="#"
               target="content"
               id="backToMediaLibrary"
               class="btn-small left back-nav"
               aria-label="Back to media library">
              <i class="bi bi-arrow-left" style="font-size: 24px;"></i>
            </a>

            <h1 class="flow-text center font-bold" 
                style="margin: 6px 0 8px 0; 
                white-space: nowrap;">
                <i class="bi bi-headset"></i>Media Library
            </h1>

            <hr style=" border: none; 
                border-top: 1px solid #22c90b;
                width: 100%; 
                margin: 0;
                margin-left: auto; 
                margin-right: auto;">
        </section>
    </header>

    <main>
        <iframe
            name="content"
            src="media-library.html">
        </iframe>

        <aside>
            <ul class="sidenav" 
                id="mobile-nav">

                <div class="sidenav-header">
                    <a href="#" class="sidenav-close audio-sidenav-close" aria-label="Close navigation">
                        <i class="bi bi-x-lg"></i>
                    </a>
                    <h6>Quick Access</h6>
                    <hr style=" border: none; 
                        border-top: 2px solid #22c90b;
                        width: 100%;">
                </div>

                <div class="nav-item">
                    <li>
                        <a href="../index.html" 
                           style="padding: 0 10px;
                                  line-height: 0;">
                            <span>Home</span>
                        </a>
                    </li>

                    <li>
                        <a href="media-library.html" 
                           target="content" 
                           id="active"
                           style="padding: 0 10px;
                                  line-height: 0;">
                            <span>Media Library</span>
                        </a>
                    </li>
            </ul>
        </aside>

        

        <section id="mediaPlayer"
                 class="media-player">
            <div class="track-info">

                <div class="back-image">
                    <img id="trackArtwork"
                    src="https://res.cloudinary.com/rahmatrust-m-s/image/upload/w_1000/f_auto/q_auto/bia-logo_hcdlmj.png"
                    alt="Artwork"
                    width="80"
                    height="60">
                </div>

            </div>

            <div class="main-controls">
                <div class="track-details">

                    <div id="trackTitle"  style="padding-top: 10px; display: flex;">
                        <marquee>- - - No Track Playing - - -</marquee>
                    </div>

                    <div id="trackArtist" style="display: none;">
                        Breman Islamic Academy
                    </div>

                </div> 
                <!-- Timeline -->
                <div class="timeline">
                    <span id="currentTime" style="margin: 10px 0 0 0;">0:00</span>
                    <input type="range" id="progress" value="0" min="0" max="100" style="margin: 10px 0 0 0;">
                    <span id="duration" style="margin: 10px 0 0 0;">0:00</span>
                </div>

                <!-- Extras -->
                <div class="extras">
                    <!-- Controls -->
                    <div class="controls">
                        <button id="backward" style="font-size: 15px;"><i class="bi bi-skip-start-fill"></i></button>
                        <button id="playPause" style="font-size: 15px;"><i class="bi bi-play-fill"></i></button>
                        <button id="forward" style="font-size: 15px;"><i class="bi bi-skip-end-fill"></i></button>
                        <!-- 10s backward -->
                        <button id="backward-10">
                            <span class="material-symbols-outlined" style="font-size: 18px">replay_10</span>
                        </button>
                        <!-- 10s forward -->
                        <button id="forward-10">
                            <!-- Material icon forward_10 -->
                            <span class="material-symbols-outlined" style="font-size: 18px;">forward_10</span>
                        </button>
                    </div>

                    <div class="playback-speed">
                        <select id="speed" class="browser-default">
                            <option value="0.5">0.5x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>
                    </div>

                    <div class="volume-controls">
                        <button id="mute"><i class="bi bi-volume-up-fill"></i></button>
                        <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
                        <span class="volume-rate">100%</span>
                    </div>
                </div>
            </div>
        </section>
        
    </main>

    <footer>
        <section class="copy-right">
            <p>&copy; 2026 Breman Islamic Academy. All rights reserved.</p>
            <p style="margin-left: 20px;">Version 4.0</p>
        </section>
    </footer>

    <!-- Materialize JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script src="../js/storage.js"></script>

    <script src="../js/player.js"></script>

    <script src="../js/player-ui.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    // Keep desktop nav links marked active when clicked
    $(document).ready(function() {
        $('.nav-links a').on('click', function() {
            $('.nav-links a').removeAttr('id');
            $(this).attr('id', 'active');
        });
    });

    // Mobile sidenav toggle controls
    const sidenav = document.getElementById('mobile-nav');
    const sidenavTrigger = document.querySelector('.sidenav-trigger');
    // Media player toggle controls
    const toggleMediaPlayerButton = document.getElementById('toggleMediaPlayer');
    const mediaPlayer = document.getElementById('mediaPlayer');
    const largeScreenBreakpoint = 1024;

    function openSidenav() {
        if (sidenav) {
            sidenav.classList.add('is-open');
        }
    }

    function closeSidenav() {
        if (sidenav) {
            sidenav.classList.remove('is-open');
        }
    }

    function handleViewportChange() {
        if (window.innerWidth > largeScreenBreakpoint) {
            closeSidenav();
        }
    }

    if (sidenavTrigger) {
        sidenavTrigger.addEventListener('click', function (event) {
            event.preventDefault();
            if (sidenav && sidenav.classList.contains('is-open')) {
                closeSidenav();
            } else {
                openSidenav();
            }
        });
    }

    document.querySelectorAll('.sidenav-close, .sidenav a').forEach(function (element) {
        element.addEventListener('click', function () {
            closeSidenav();
        });
    });

    if (toggleMediaPlayerButton && mediaPlayer) {
        toggleMediaPlayerButton.addEventListener('click', function () {
            const isHidden = mediaPlayer.style.display === 'none';
            mediaPlayer.style.display = isHidden ? 'flex' : 'none';
        });
    }

    window.addEventListener('resize', handleViewportChange);
    handleViewportChange();

    const iframe = document.querySelector('iframe[name="content"]');
    const backButton = document.getElementById('backToMediaLibrary');
    const defaultFramePage = 'media-library.html';

    function getIframePageName() {
        if (!iframe || !iframe.contentWindow || !iframe.contentWindow.location) {
            return '';
        }
        const href = iframe.contentWindow.location.href;
        return href.split('/').pop() || '';
    }

    function updateBackButton() {
        if (!backButton) return;
        const pageName = getIframePageName();
        const isLibraryView = pageName === defaultFramePage || pageName === '';
        backButton.classList.toggle('visible', !isLibraryView);
    }

    if (backButton) {
        backButton.addEventListener('click', function (event) {
            event.preventDefault();
            if (iframe) {
                iframe.src = defaultFramePage;
            }
            updateBackButton();
        });
    }

    if (iframe) {
        iframe.addEventListener('load', updateBackButton);
    }

    window.addEventListener('load', updateBackButton);
    </script>
    <audio
        id="globalAudio"
        preload="metadata">
    </audio>
</body>
</html>
